<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyTree</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  background: #0f0f0f;
  color: white;
}

/* SIDEBAR (Reddit style) */
.sidebar {
  width: 250px;
  height: 100vh;
  background: #111;
  padding: 20px;
  border-right: 1px solid #222;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #b6ff2b;
  margin-bottom: 30px;
}

.nav a {
  display: block;
  padding: 10px;
  color: #ccc;
  text-decoration: none;
  border-radius: 8px;
}

.nav a:hover {
  background: #1a1a1a;
}

/* MAIN FEED (Twitter style) */
.main {
  flex: 1;
  max-width: 700px;
  margin: auto;
  border-left: 1px solid #222;
  border-right: 1px solid #222;
}

.header {
  padding: 15px;
  border-bottom: 1px solid #222;
  font-weight: bold;
}

/* POST BOX */
.post-box {
  padding: 15px;
  border-bottom: 1px solid #222;
}

.post-box textarea {
  width: 100%;
  background: #111;
  border: none;
  color: white;
  resize: none;
  padding: 10px;
  border-radius: 8px;
}

.post-box button {
  margin-top: 10px;
  background: #b6ff2b;
  border: none;
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
}

/* POSTS */
.post {
  padding: 15px;
  border-bottom: 1px solid #222;
}

.post:hover {
  background: #111;
}

.username {
  font-weight: bold;
  color: #b6ff2b;
}

.content {
  margin-top: 5px;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 15px;
  margin-top: 10px;
  color: #888;
  font-size: 14px;
}

.actions span:hover {
  color: #b6ff2b;
  cursor: pointer;
}

/* RIGHT PANEL (Bluesky style) */
.right {
  width: 300px;
  padding: 20px;
  border-left: 1px solid #222;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.card h3 {
  margin-bottom: 10px;
}

.trend {
  padding: 5px 0;
  color: #ccc;
}
</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🌳 FamilyTree</div>
  <div class="nav">
    <a href="#">🏠 Home</a>
    <a href="#">🔥 Trending</a>
    <a href="#">👤 Profile</a>
    <a href="#">⚙ Settings</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">Home Feed</div>

  <!-- POST BOX -->
  <div class="post-box">
    <textarea placeholder="Share something with the tree..." rows="3"></textarea>
    <button onclick="addPost()">Post</button>
  </div>

  <!-- POSTS -->
  <div id="feed">

    <div class="post">
      <div class="username">@treeuser</div>
      <div class="content">Welcome to FamilyTree 🌿</div>
      <div class="actions">
        <span>💬 Reply</span>
        <span>🔁 Rebranch</span>
        <span>❤️ Like</span>
      </div>
    </div>

  </div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

  <div class="card">
    <h3>🌿 Trending Branches</h3>
    <div class="trend">#FamilyTree</div>
    <div class="trend">#NewApp</div>
    <div class="trend">#HelloWorld</div>
  </div>

  <div class="card">
    <h3>👥 Suggested Users</h3>
    <div class="trend">@limeleaf</div>
    <div class="trend">@brancher</div>
    <div class="trend">@rootdev</div>
  </div>

</div>

<script>
function addPost() {
  const textarea = document.querySelector("textarea");
  const text = textarea.value;

  if (text.trim() === "") return;

  const post = document.createElement("div");
  post.className = "post";

  post.innerHTML = `
    <div class="username">@you</div>
    <div class="content">${text}</div>
    <div class="actions">
      <span>💬 Reply</span>
      <span>🔁 Rebranch</span>
      <span>❤️ Like</span>
    </div>
  `;

  document.getElementById("feed").prepend(post);
  textarea.value = "";
}
</script>

</body>
</html>
